name: image-publish
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        run: |
          docker buildx build \
            --build-arg VERSION=${{ github.ref_name }} \
            -t ghcr.io/mackliao/tfbpgo:${{ github.ref_name }} \
            -t ghcr.io/mackliao/tfbpgo:latest \
            --push \
            .
