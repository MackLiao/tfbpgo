# Production docker-compose for tfbindingandperturbation.com.
#
# Prerequisites (one-time on the host):
#   1. Traefik must already be running on the external `web` network
#      (see reference/compose/production/traefik/). This compose file does
#      NOT manage Traefik — it only attaches services to the existing one.
#   2. Create the external network once:
#         docker network create web
#   3. Copy `.env.example` to `.env` and fill in every value (S3 creds,
#      artifact SHA256, LEGACY_TAG, HF_TOKEN, etc.). The stack will not
#      start cleanly without it.
#
# Bring-up order (clean host — run these IN ORDER):
#   docker compose pull
#   docker compose --profile init up tfbp-data-init   # one-shot: download + sha256-verify the artifact
#   docker compose up -d                              # starts tfbp + shinyapp
#
# IMPORTANT: `tfbp` has NO `depends_on` on tfbp-data-init. Compose refuses to
# start a service whose dependency lives in an inactive profile, and the init
# container is profile-gated (`profiles: ["init"]`). So you MUST run the
# `--profile init` step yourself before `up -d`. If you skip it, `tfbp` starts
# against an empty `tfbp_data` volume, fails the read-only DuckDB open at
# startup (fail-fast, §9.5), and — because `restart: unless-stopped` — crash-loops.
# See deploy/README.md "One-time host setup".
#
# 410 routing for stale `/api/v/{v}/*` URLs is handled INSIDE the Go
# service (Phase 1 `RequireArtifactVersion` middleware returns 410 +
# `Location: /api/version`). Traefik needs no rule for this.
#
# Volume access:
#   - tfbp_data is mounted :ro into the runtime `tfbp` service (read-only DB)
#   - tfbp_data is mounted rw into `tfbp-data-init` (writes the artifact)
#
# Legacy grace period: `shinyapp` keeps serving the old Python Shiny app on
# legacy.tfbindingandperturbation.com for 30 days post-cutover (spec §11.1).
# The image must already be published to GHCR — see .env.example for the
# tagging convention.

services:
  tfbp:
    image: ghcr.io/brentlab/tfbpshiny-go:${TAG:-latest}
    restart: unless-stopped
    # tfbp-data-init is opt-in via profile `init`; run it explicitly to
    # download/refresh the artifact into the named volume before bringing
    # this service up. There is no depends_on because Compose refuses to
    # start a service whose required dependency is in an inactive profile.
    environment:
      DUCKDB_PATH: /data/tfbp.duckdb
      DUCKDB_TEMP_DIR: /tmp/duckdb
      CACHE_SIZE_BYTES: "134217728"
      LOG_LEVEL: info
      PORT: "8080"
      # §6.3 pool knobs — env-tunable so the cutover load test can retune them
      # without recompiling. Defaults match the spec t3.small values. Lower
      # DUCKDB_MEMORY_LIMIT (e.g. 600MB) for the legacy co-tenancy overlap.
      DUCKDB_MEMORY_LIMIT: ${DUCKDB_MEMORY_LIMIT:-800MB}
      DUCKDB_MAX_TEMP_SIZE: ${DUCKDB_MAX_TEMP_SIZE:-2GB}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-2}
      MAX_INFLIGHT_REQUESTS: ${MAX_INFLIGHT_REQUESTS:-128}
    volumes:
      - tfbp_data:/data:ro
      - tfbp_tmp:/tmp/duckdb
    networks: [web]
    # Lower TFBP_MEM_LIMIT (e.g. 1.0g) for the legacy co-tenancy overlap; revert
    # to 1.6g once shinyapp is retired. memswap_limit == mem_limit ⇒ swap off.
    mem_limit: ${TFBP_MEM_LIMIT:-1.6g}
    memswap_limit: ${TFBP_MEM_LIMIT:-1.6g}
    # Container hardening: the Go binary needs no Linux capabilities, never
    # escalates privileges, and bounds goroutines via MAX_INFLIGHT_REQUESTS —
    # pids_limit is a backstop against runaway forks/threads.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.tfbp.rule=Host(`tfbindingandperturbation.com`)
      - traefik.http.routers.tfbp.entrypoints=web-secure
      - traefik.http.routers.tfbp.tls.certresolver=letsencrypt
      - traefik.http.services.tfbp.loadbalancer.server.port=8080
      # NO active /readyz healthcheck here while running a SINGLE replica. A
      # demo load test showed /readyz's DuckDB canary times out under load (the
      # 2-conn pool is saturated), so Traefik would mark the only backend
      # unhealthy and 503/404 a burst of live traffic — with no failover target,
      # it converts "slow" into "down". Re-enable ONLY with >1 replica AND a
      # /readyz backed by a dedicated DB connection so it can't starve. The
      # container's own liveness HEALTHCHECK (/healthz) + startup fail-fast
      # already cover the broken-artifact / dead-process cases.
      # /metrics leaks operational internals (cache ratios, latencies, artifact
      # version) — restrict it to the operator/monitoring CIDR. The CloudWatch
      # agent scrapes the container directly on the docker network, bypassing
      # Traefik, so this only blocks public internet scrapes.
      - traefik.http.routers.tfbp-metrics.rule=Host(`tfbindingandperturbation.com`) && Path(`/metrics`)
      - traefik.http.routers.tfbp-metrics.entrypoints=web-secure
      - traefik.http.routers.tfbp-metrics.tls.certresolver=letsencrypt
      - traefik.http.routers.tfbp-metrics.service=tfbp
      - traefik.http.routers.tfbp-metrics.middlewares=tfbp-metrics-allow
      - traefik.http.middlewares.tfbp-metrics-allow.ipallowlist.sourcerange=${METRICS_ALLOW_CIDR:-127.0.0.1/32}

  tfbp-data-init:
    image: amazon/aws-cli:2.35.2
    restart: "no"
    # Opt-in service: run explicitly via `docker compose --profile init up
    # tfbp-data-init`. A plain `docker compose up -d` (no profile) brings up
    # only the steady-state services (tfbp + shinyapp) and does not re-run
    # the init container — see deploy/README.md "Artifact refresh".
    profiles: ["init"]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -euo pipefail
        # Always clear the staging file on exit: a failed download or SHA
        # mismatch must not leave a multi-GB .new orphan on the volume
        # (repeated failures would exhaust the 30GB disk). After a successful
        # mv the file is gone and rm -f is a no-op.
        trap 'rm -f /data/tfbp.duckdb.new' EXIT
        ok=""
        for i in 1 2 3; do
          if aws s3 cp "s3://${ARTIFACT_BUCKET}/${ARTIFACT_KEY}" /data/tfbp.duckdb.new; then
            ok=1; break
          fi
          echo "download attempt $$i failed; retrying in $$((i*10))s" >&2
          sleep $$((i*10))
        done
        [ -n "$$ok" ] || { echo "FATAL: download failed after 3 attempts" >&2; exit 1; }
        echo "${ARTIFACT_SHA256}  /data/tfbp.duckdb.new" | sha256sum -c -
        mv /data/tfbp.duckdb.new /data/tfbp.duckdb
        echo "artifact installed: $$(wc -c < /data/tfbp.duckdb) bytes"
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-2}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET}
      ARTIFACT_KEY: ${ARTIFACT_KEY}
      ARTIFACT_SHA256: ${ARTIFACT_SHA256}
    volumes:
      - tfbp_data:/data

  # Legacy Shiny app on legacy.tfbindingandperturbation.com — 30-day grace.
  # Inherits its image/build from reference/compose/production/shiny/Dockerfile;
  # this entry only swaps the routing rule. The image must be published to
  # GHCR before cutover (tag the pre-cutover main of the legacy Python repo
  # and push as ghcr.io/brentlab/tfbpshiny:${LEGACY_TAG}).
  shinyapp:
    image: ghcr.io/brentlab/tfbpshiny:${LEGACY_TAG:-latest}
    restart: unless-stopped
    # Bound the legacy app's memory so it cannot balloon unboundedly and
    # trigger the host OOM killer (which might reap `tfbp` or Traefik rather
    # than Shiny). NOTE: tfbp(1.6g) + shinyapp(0.5g) + Traefik + OS does NOT
    # fit a 2GB t3.small. For the 30-day grace overlap you MUST either run this
    # legacy service on a SEPARATE instance, or temporarily lower tfbp's
    # mem_limit and DUCKDB_MEMORY_LIMIT (now env-tunable) so the sum fits.
    # See deploy/README.md "Legacy grace-period co-tenancy".
    mem_limit: 512m
    memswap_limit: 512m
    security_opt:
      - no-new-privileges:true
    environment:
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - hf_cache:/hf-cache
    networks: [web]
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.legacy-shiny.rule=Host(`legacy.tfbindingandperturbation.com`)
      - traefik.http.routers.legacy-shiny.entrypoints=web-secure
      - traefik.http.routers.legacy-shiny.tls.certresolver=letsencrypt
      - traefik.http.services.legacy-shiny.loadbalancer.server.port=8000

volumes:
  tfbp_data:
  tfbp_tmp:
  hf_cache:

networks:
  web:
    external: true
